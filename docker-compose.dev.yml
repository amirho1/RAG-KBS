services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    command: pnpm start:dev
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_kbs:rag_kbs_password@postgres:5432/rag_kbs}
      POSTGRES_USER: ${POSTGRES_USER:-rag_kbs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_kbs_password}
      POSTGRES_DB: ${POSTGRES_DB:-rag_kbs}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_kbs_development}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-rag_kbs_development}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-1536}
      QDRANT_DISTANCE_METRIC: ${QDRANT_DISTANCE_METRIC:-Cosine}
      QDRANT_UPSERT_BATCH_SIZE: ${QDRANT_UPSERT_BATCH_SIZE:-64}
      QDRANT_TIMEOUT_MS: ${QDRANT_TIMEOUT_MS:-30000}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/app/storage}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-rag-kbs-development}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-rag-kbs-minio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-rag-kbs-minio-password}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      EMBEDDING_DISTANCE_METRIC: ${EMBEDDING_DISTANCE_METRIC:-Cosine}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-64}
      EMBEDDING_TIMEOUT_MS: ${EMBEDDING_TIMEOUT_MS:-30000}
      EMBEDDING_MAX_RETRIES: ${EMBEDDING_MAX_RETRIES:-3}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-development-placeholder}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-development-placeholder}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      CHUNKING_DEFAULT_SIZE: ${CHUNKING_DEFAULT_SIZE:-800}
      CHUNKING_DEFAULT_OVERLAP: ${CHUNKING_DEFAULT_OVERLAP:-120}
      CHUNKING_TEXT_PREVIEW_LENGTH: ${CHUNKING_TEXT_PREVIEW_LENGTH:-1000}
      CHUNKING_MAX_CHUNKS_PER_DOCUMENT: ${CHUNKING_MAX_CHUNKS_PER_DOCUMENT:-10000}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      ALLOWED_UPLOAD_MIME_TYPES: ${ALLOWED_UPLOAD_MIME_TYPES:-application/pdf,text/plain,text/markdown,application/json,text/csv,text/html,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet}
      BULLMQ_QUEUE_PREFIX: ${BULLMQ_QUEUE_PREFIX:-rag-kbs}
      INGESTION_QUEUE_NAME: ${INGESTION_QUEUE_NAME:-ingestion}
      INGESTION_CONCURRENCY: ${INGESTION_CONCURRENCY:-3}
      INGESTION_MAX_ATTEMPTS: ${INGESTION_MAX_ATTEMPTS:-3}
      INGESTION_BACKOFF_DELAY_MS: ${INGESTION_BACKOFF_DELAY_MS:-5000}
      INGESTION_REMOVE_ON_COMPLETE_COUNT: ${INGESTION_REMOVE_ON_COMPLETE_COUNT:-1000}
      INGESTION_REMOVE_ON_FAIL_COUNT: ${INGESTION_REMOVE_ON_FAIL_COUNT:-5000}
      INGESTION_JOB_TIMEOUT_MS: ${INGESTION_JOB_TIMEOUT_MS:-120000}
      INGESTION_MAX_TEXT_CONTENT_BYTES: ${INGESTION_MAX_TEXT_CONTENT_BYTES:-1048576}
      INGESTION_TEXT_PREVIEW_LENGTH: ${INGESTION_TEXT_PREVIEW_LENGTH:-1000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
      LOG_DIR: ${LOG_DIR:-logs}
      LOG_ROTATION_ENABLED: ${LOG_ROTATION_ENABLED:-true}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-14}
      REQUEST_LOGGING_ENABLED: ${REQUEST_LOGGING_ENABLED:-true}
      REQUEST_BODY_LOGGING_ENABLED: ${REQUEST_BODY_LOGGING_ENABLED:-false}
      WAIT_FOR_HOSTS: postgres:5432,redis:6379,qdrant:6333,minio:9000
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-500}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      TSC_WATCHFILE: ${TSC_WATCHFILE:-DynamicPriorityPolling}
      TSC_WATCHDIRECTORY: ${TSC_WATCHDIRECTORY:-RecursiveDirectoryUsingDynamicPriorityPolling}
    volumes:
      - type: bind
        source: .
        target: /app
      - type: volume
        source: node-modules
        target: /app/node_modules
      - type: volume
        source: logs
        target: /app/logs
      - type: volume
        source: local-storage
        target: /app/storage
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:'' + (process.env.PORT || ''3000'') + ''/health/ready'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - rag-kbs

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    command: pnpm worker:dev
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_kbs:rag_kbs_password@postgres:5432/rag_kbs}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_kbs_development}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-rag_kbs_development}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-1536}
      QDRANT_DISTANCE_METRIC: ${QDRANT_DISTANCE_METRIC:-Cosine}
      QDRANT_UPSERT_BATCH_SIZE: ${QDRANT_UPSERT_BATCH_SIZE:-64}
      QDRANT_TIMEOUT_MS: ${QDRANT_TIMEOUT_MS:-30000}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/app/storage}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-rag-kbs-development}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-rag-kbs-minio}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-rag-kbs-minio-password}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      EMBEDDING_DISTANCE_METRIC: ${EMBEDDING_DISTANCE_METRIC:-Cosine}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-64}
      EMBEDDING_TIMEOUT_MS: ${EMBEDDING_TIMEOUT_MS:-30000}
      EMBEDDING_MAX_RETRIES: ${EMBEDDING_MAX_RETRIES:-3}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-development-placeholder}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-development-placeholder}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      CHUNKING_DEFAULT_SIZE: ${CHUNKING_DEFAULT_SIZE:-800}
      CHUNKING_DEFAULT_OVERLAP: ${CHUNKING_DEFAULT_OVERLAP:-120}
      CHUNKING_TEXT_PREVIEW_LENGTH: ${CHUNKING_TEXT_PREVIEW_LENGTH:-1000}
      CHUNKING_MAX_CHUNKS_PER_DOCUMENT: ${CHUNKING_MAX_CHUNKS_PER_DOCUMENT:-10000}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      ALLOWED_UPLOAD_MIME_TYPES: ${ALLOWED_UPLOAD_MIME_TYPES:-application/pdf,text/plain,text/markdown,application/json,text/csv,text/html,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet}
      BULLMQ_QUEUE_PREFIX: ${BULLMQ_QUEUE_PREFIX:-rag-kbs}
      INGESTION_QUEUE_NAME: ${INGESTION_QUEUE_NAME:-ingestion}
      INGESTION_CONCURRENCY: ${INGESTION_CONCURRENCY:-3}
      INGESTION_MAX_ATTEMPTS: ${INGESTION_MAX_ATTEMPTS:-3}
      INGESTION_BACKOFF_DELAY_MS: ${INGESTION_BACKOFF_DELAY_MS:-5000}
      INGESTION_REMOVE_ON_COMPLETE_COUNT: ${INGESTION_REMOVE_ON_COMPLETE_COUNT:-1000}
      INGESTION_REMOVE_ON_FAIL_COUNT: ${INGESTION_REMOVE_ON_FAIL_COUNT:-5000}
      INGESTION_JOB_TIMEOUT_MS: ${INGESTION_JOB_TIMEOUT_MS:-120000}
      INGESTION_MAX_TEXT_CONTENT_BYTES: ${INGESTION_MAX_TEXT_CONTENT_BYTES:-1048576}
      INGESTION_TEXT_PREVIEW_LENGTH: ${INGESTION_TEXT_PREVIEW_LENGTH:-1000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
      LOG_DIR: ${LOG_DIR:-logs}
      LOG_ROTATION_ENABLED: ${LOG_ROTATION_ENABLED:-true}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-14}
      REQUEST_LOGGING_ENABLED: ${REQUEST_LOGGING_ENABLED:-true}
      REQUEST_BODY_LOGGING_ENABLED: ${REQUEST_BODY_LOGGING_ENABLED:-false}
      WAIT_FOR_HOSTS: postgres:5432,redis:6379,qdrant:6333,minio:9000
      WORKER_READY_FILE: /tmp/rag-kbs-worker.ready
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      CHOKIDAR_INTERVAL: ${CHOKIDAR_INTERVAL:-500}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      TSC_WATCHFILE: ${TSC_WATCHFILE:-DynamicPriorityPolling}
      TSC_WATCHDIRECTORY: ${TSC_WATCHDIRECTORY:-RecursiveDirectoryUsingDynamicPriorityPolling}
    volumes:
      - type: bind
        source: .
        target: /app
      - type: volume
        source: node-modules
        target: /app/node_modules
      - type: volume
        source: logs
        target: /app/logs
      - type: volume
        source: local-storage
        target: /app/storage
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'test -f "$${WORKER_READY_FILE:-/tmp/rag-kbs-worker.ready}"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - rag-kbs

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    command: pnpm db:migrate:deploy
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_kbs:rag_kbs_password@postgres:5432/rag_kbs}
      WAIT_FOR_HOSTS: postgres:5432
    volumes:
      - type: bind
        source: .
        target: /app
      - type: volume
        source: node-modules
        target: /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rag-kbs

  migrate-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    command: pnpm db:migrate:dev
    profiles:
      - tools
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_kbs:rag_kbs_password@postgres:5432/rag_kbs}
      WAIT_FOR_HOSTS: postgres:5432
    volumes:
      - type: bind
        source: .
        target: /app
      - type: volume
        source: node-modules
        target: /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rag-kbs

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_kbs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_kbs_password}
      POSTGRES_DB: ${POSTGRES_DB:-rag_kbs}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-kbs

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-kbs

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /readyz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-kbs

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rag-kbs-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rag-kbs-minio-password}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-kbs

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    entrypoint: /bin/sh
    command:
      - -c
      - >
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}"
        "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${S3_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rag-kbs-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-rag-kbs-minio-password}
      S3_BUCKET: ${S3_BUCKET:-rag-kbs-development}
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - rag-kbs
