services:
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: migrator
    command: pnpm db:migrate:deploy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_kbs:change-me@postgres:5432/rag_kbs}
      WAIT_FOR_HOSTS: ${MIGRATE_WAIT_FOR_HOSTS:-postgres:5432}
      WAIT_TIMEOUT_SECONDS: ${WAIT_TIMEOUT_SECONDS:-120}
    networks:
      - rag-kbs

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api-runtime
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_kbs:change-me@postgres:5432/rag_kbs}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_kbs_production}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-rag-kbs-production}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-change-me}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-change-me}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-change-me}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      BULLMQ_QUEUE_PREFIX: ${BULLMQ_QUEUE_PREFIX:-rag-kbs}
      INGESTION_QUEUE_NAME: ${INGESTION_QUEUE_NAME:-ingestion}
      INGESTION_CONCURRENCY: ${INGESTION_CONCURRENCY:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_DIR: ${LOG_DIR:-logs}
      LOG_ROTATION_ENABLED: ${LOG_ROTATION_ENABLED:-true}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-14}
      REQUEST_LOGGING_ENABLED: ${REQUEST_LOGGING_ENABLED:-true}
      REQUEST_BODY_LOGGING_ENABLED: ${REQUEST_BODY_LOGGING_ENABLED:-false}
      WAIT_FOR_HOSTS: ${API_WAIT_FOR_HOSTS:-postgres:5432,redis:6379,qdrant:6333}
    volumes:
      - type: volume
        source: logs
        target: /app/logs
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:'' + (process.env.PORT || ''3000'') + ''/health/ready'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - rag-kbs

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: worker-runtime
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://rag_kbs:change-me@postgres:5432/rag_kbs}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-rag_kbs_production}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-rag-kbs-production}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-change-me}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-change-me}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1536}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-change-me}
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      BULLMQ_QUEUE_PREFIX: ${BULLMQ_QUEUE_PREFIX:-rag-kbs}
      INGESTION_QUEUE_NAME: ${INGESTION_QUEUE_NAME:-ingestion}
      INGESTION_CONCURRENCY: ${INGESTION_CONCURRENCY:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      LOG_DIR: ${LOG_DIR:-logs}
      LOG_ROTATION_ENABLED: ${LOG_ROTATION_ENABLED:-true}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-14}
      REQUEST_LOGGING_ENABLED: ${REQUEST_LOGGING_ENABLED:-true}
      REQUEST_BODY_LOGGING_ENABLED: ${REQUEST_BODY_LOGGING_ENABLED:-false}
      WAIT_FOR_HOSTS: ${WORKER_WAIT_FOR_HOSTS:-postgres:5432,redis:6379,qdrant:6333}
      WORKER_READY_FILE: /tmp/rag-kbs-worker.ready
    volumes:
      - type: volume
        source: logs
        target: /app/logs
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'test -f "$${WORKER_READY_FILE:-/tmp/rag-kbs-worker.ready}"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - rag-kbs

  postgres:
    image: postgres:17-alpine
    profiles:
      - self-hosted
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag_kbs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-rag_kbs}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-kbs

  redis:
    image: redis:7-alpine
    profiles:
      - self-hosted
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-kbs

  qdrant:
    image: qdrant/qdrant:v1.13.4
    profiles:
      - self-hosted
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/6333; printf \"GET /readyz HTTP/1.1\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-kbs

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles:
      - self-hosted
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-rag-kbs-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-kbs
